<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Show Player</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f13; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #1a1a22; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

/* Header */
.header { display: flex; align-items: center; gap: 14px; padding: 0 20px; height: 52px; background: #16161e; border-bottom: 1px solid #2a2a36; flex-shrink: 0; }
.logo { font-size: 18px; font-weight: 700; color: #fff; }
.logo-sub { font-size: 12px; color: #4a9eff; font-weight: 600; }
.header-spacer { flex: 1; }
.settings-btn { background: none; border: 1px solid #2a2a3a; color: #666; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
.settings-btn:hover { color: #ccc; border-color: #3a3a4a; }

/* Config panel */
.config-panel { background: #16161e; border-bottom: 1px solid #2a2a36; padding: 14px 20px; display: none; flex-direction: column; gap: 10px; }
.config-panel.open { display: flex; }
.config-row { display: flex; align-items: center; gap: 10px; }
.config-label { font-size: 12px; color: #888; width: 90px; flex-shrink: 0; }
.config-input { background: #1e1e28; border: 1px solid #3a3a4a; color: #ddd; padding: 6px 10px; border-radius: 5px; font-size: 13px; flex: 1; max-width: 300px; }
.config-hint { font-size: 11px; color: #444; }
.btn-connect { background: #1a3a5a; color: #4a9eff; border: 1px solid #2a4a6a; padding: 6px 16px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-connect:hover { background: #1e4a6a; }

/* Now playing */
.now-playing { display: none; align-items: center; gap: 12px; padding: 10px 20px; background: #1a2a1a; border-bottom: 1px solid #2a4a2a; flex-shrink: 0; }
.now-playing.active { display: flex; }
.np-dot { color: #4caf50; font-size: 10px; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.np-name { font-weight: 600; flex: 1; }
.np-time { font-family: monospace; color: #4caf50; font-size: 13px; }
.np-progress { flex: 2; height: 4px; background: #1e3a1e; border-radius: 2px; overflow: hidden; cursor: pointer; }
.np-progress-fill { height: 100%; background: #4caf50; transition: width 0.25s linear; }
.btn-stop { background: #4a1a1a; color: #ff6666; border: 1px solid #6a2a2a; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 13px; }
.btn-stop:hover { background: #5a2a2a; }

/* Status */
.status-bar { padding: 6px 20px; font-size: 12px; color: #666; background: #14141c; border-bottom: 1px solid #1e1e28; flex-shrink: 0; display: none; }
.status-bar.visible { display: block; }
.status-bar.warn { color: #ff9800; }
.status-bar.err  { color: #ff6666; }
.status-bar.ok   { color: #4caf50; }

/* Shows */
.shows-area { flex: 1; min-height: 0; overflow-y: auto; padding: 16px 20px; }
.empty-state { color: #444; font-size: 13px; text-align: center; padding: 40px 20px; line-height: 1.8; }
.empty-state a { color: #4a9eff; cursor: pointer; }

/* Show cards */
.show-card { background: #16161e; border: 1px solid #2a2a36; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
.show-card-header { width: 100%; display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: none; border: none; color: inherit; cursor: pointer; text-align: left; }
.show-card-header:hover { background: #1e1e28; }
.show-card-name { font-weight: 600; font-size: 15px; flex: 1; }
.show-card-meta { font-size: 12px; color: #555; }
.show-card-chevron { color: #444; font-size: 11px; transition: transform 0.15s; }
.show-card-chevron.open { transform: rotate(180deg); }

/* Sequence rows */
.seq-list { border-top: 1px solid #2a2a36; max-height: 420px; overflow-y: auto; }
.seq-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #1e1e28; }
.seq-row:last-child { border-bottom: none; }
.seq-row:hover { background: #1a1a24; }
.seq-row.playing { background: #1a2a1a; }
.seq-info { flex: 1; min-width: 0; }
.seq-name { font-size: 13px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.seq-flags { display: flex; gap: 4px; margin-top: 3px; }
.flag { font-size: 10px; padding: 2px 6px; border-radius: 4px; }
.flag-ok   { background: #1a3a1a; color: #4caf50; }
.flag-warn { background: #3a2a1a; color: #ff9800; }
.btn-play { background: #1a3a5a; color: #4a9eff; border: 1px solid #2a4a6a; padding: 6px 16px; border-radius: 5px; cursor: pointer; font-size: 13px; white-space: nowrap; }
.btn-play:hover:not(:disabled) { background: #1e4a6a; }
.btn-play:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-seq-stop { background: #4a1a1a; color: #ff6666; border: 1px solid #6a2a2a; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 13px; }
.btn-seq-stop:hover { background: #5a2a2a; }
.seq-loading { padding: 10px 16px; font-size: 12px; color: #444; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">Show Player</span>
  <span class="logo-sub">▶</span>
  <div class="header-spacer"></div>
  <button class="settings-btn" onclick="toggleConfig()">⚙ Settings</button>
</div>

<div class="config-panel" id="configPanel">
  <div class="config-row">
    <span class="config-label">VPS / Server URL</span>
    <input class="config-input" id="vpsUrl" placeholder="http://YOUR.VPS.IP" />
    <button class="btn-connect" onclick="saveAndConnect()">Connect</button>
  </div>
  <div class="config-row">
    <span class="config-label">QLC+ host</span>
    <input class="config-input" id="qlcHost" placeholder="127.0.0.1" style="max-width:200px" />
  </div>
  <div class="config-hint">VPS URL is where Show Creator is hosted. QLC+ host is where QLC+ is running (usually 127.0.0.1). Make sure QLC+ web server is enabled on port 9999 (Settings → Enable web interface).</div>
</div>

<div class="now-playing" id="nowPlaying">
  <span class="np-dot">●</span>
  <span class="np-name" id="npName">—</span>
  <div class="np-progress" id="npProgress" onclick="seekAudio(event)">
    <div class="np-progress-fill" id="npFill" style="width:0%"></div>
  </div>
  <span class="np-time" id="npTime">0:00</span>
  <button class="btn-stop" onclick="stopPlayback(true)">■ Stop</button>
</div>

<div class="status-bar" id="statusBar"></div>

<div class="shows-area" id="showsArea">
  <div class="empty-state" id="emptyState">
    Configure the VPS URL above and click <strong>Connect</strong> to load your shows.
  </div>
</div>

<audio id="audio" hidden></audio>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const BRIDGE_PORT = 3848;
let vpsUrl        = localStorage.getItem('vpsUrl')  || '';
let qlcHost       = localStorage.getItem('qlcHost') || '127.0.0.1';
let playing     = null;  // { seqId, funcId, duration }
let timerHandle = null;
let showData    = {};    // name → full show json
let expanded    = {};    // name → bool

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('vpsUrl').value  = vpsUrl;
document.getElementById('qlcHost').value = qlcHost;

if (vpsUrl) {
  loadShows();
} else {
  document.getElementById('configPanel').classList.add('open');
}

// ── Config ────────────────────────────────────────────────────────────────────
function toggleConfig() {
  document.getElementById('configPanel').classList.toggle('open');
}

function saveAndConnect() {
  vpsUrl   = document.getElementById('vpsUrl').value.trim().replace(/\/$/, '');
  qlcHost  = document.getElementById('qlcHost').value.trim() || '127.0.0.1';
  localStorage.setItem('vpsUrl',   vpsUrl);
  localStorage.setItem('qlcHost',  qlcHost);
  document.getElementById('configPanel').classList.remove('open');
  loadShows();
}

// ── Load shows ────────────────────────────────────────────────────────────────
async function loadShows() {
  if (!vpsUrl) return;
  setStatus('Connecting to ' + vpsUrl + '…', '');
  try {
    const shows = await fetch(`${vpsUrl}/api/shows`).then(r => r.json());
    renderShows(shows);
    setStatus('');
  } catch (e) {
    setStatus('⚠ Could not connect to ' + vpsUrl + ' — check the URL and that Show Creator is running.', 'err');
    renderShows([]);
  }
}

async function loadShowData(name) {
  if (showData[name]) return showData[name];
  const d = await fetch(`${vpsUrl}/api/shows/${encodeURIComponent(name)}`).then(r => r.json());
  showData[name] = d;
  return d;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderShows(shows) {
  const area = document.getElementById('showsArea');
  if (!shows.length) {
    area.innerHTML = `<div class="empty-state">No shows found on the server.<br>Create one in <a onclick="openCreator()">Show Creator</a> first.</div>`;
    return;
  }
  area.innerHTML = '';
  for (const s of shows) {
    const card = document.createElement('div');
    card.className = 'show-card';
    card.id = 'card-' + s.name;
    card.innerHTML = `
      <button class="show-card-header" onclick="toggleShow('${esc(s.name)}')">
        <span class="show-card-name">${esc(s.name)}</span>
        <span class="show-card-meta">${s.sequences} sequence${s.sequences !== 1 ? 's' : ''}</span>
        <span class="show-card-chevron" id="chev-${esc(s.name)}">▼</span>
      </button>
      <div class="seq-list" id="seqs-${esc(s.name)}" style="display:none"></div>
    `;
    area.appendChild(card);
  }
}

async function toggleShow(name) {
  const seqList = document.getElementById('seqs-' + name);
  const chev    = document.getElementById('chev-' + name);
  const isOpen  = expanded[name];

  if (isOpen) {
    seqList.style.display = 'none';
    chev.classList.remove('open');
    expanded[name] = false;
  } else {
    seqList.style.display = 'block';
    chev.classList.add('open');
    expanded[name] = true;
    if (!showData[name]) {
      seqList.innerHTML = '<div class="seq-loading">Loading…</div>';
      await loadShowData(name);
    }
    renderSequences(name);
  }
}

function renderSequences(name) {
  const show    = showData[name];
  const seqList = document.getElementById('seqs-' + name);
  if (!show?.sequences?.length) {
    seqList.innerHTML = '<div class="seq-loading">No sequences in this show.</div>';
    return;
  }
  seqList.innerHTML = '';
  for (const seq of show.sequences) {
    const hasOsc   = !!seq.qlcFunctionId;
    const hasAudio = !!seq.audioPath;
    const isPlaying = playing?.seqId === seq.id;
    const row = document.createElement('div');
    row.className = 'seq-row' + (isPlaying ? ' playing' : '');
    row.id = 'row-' + seq.id;
    row.innerHTML = `
      <div class="seq-info">
        <div class="seq-name">${esc(seq.name)}</div>
        <div class="seq-flags">
          ${hasOsc   ? '<span class="flag flag-ok">QLC+</span>' : '<span class="flag flag-warn">no QLC+ ID — export .qxw first</span>'}
          ${hasAudio ? '<span class="flag flag-ok">Audio</span>' : '<span class="flag flag-warn">no audio</span>'}
        </div>
      </div>
      ${isPlaying
        ? `<button class="btn-seq-stop" onclick="stopPlayback(true)">■ Stop</button>`
        : `<button class="btn-play" onclick="playSequence('${esc(name)}','${seq.id}')"
             ${!hasAudio ? 'disabled title="No audio uploaded for this sequence"' : ''}>▶ Play</button>`
      }
    `;
    seqList.appendChild(row);
  }
}

// ── Playback ──────────────────────────────────────────────────────────────────
async function playSequence(showName, seqId) {
  stopPlayback(false);

  const show = showData[showName];
  const seq  = show?.sequences?.find(s => s.id === seqId);
  if (!seq) return;

  // Trigger QLC+ via local bridge — skip if no function ID exported yet
  if (seq.qlcFunctionId) {
    try {
      const r = await fetch(`http://127.0.0.1:${BRIDGE_PORT}/qlc`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ host: qlcHost, port: 9999, functionId: seq.qlcFunctionId, action: 1 }),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        setStatus('⚠ QLC+ error: ' + (err.error ?? 'unknown'), 'warn');
      } else {
        setStatus('▶ QLC+ sequence triggered', 'ok');
      }
    } catch (e) {
      setStatus('⚠ Bridge not responding: ' + e.message, 'err');
    }
  } else {
    setStatus('▶ Audio only — no QLC+ ID (export .qxw to enable lights)', '');
  }

  // Play audio from VPS
  const audio = document.getElementById('audio');
  audio.src = vpsUrl + seq.audioPath;
  audio.currentTime = 0;
  audio.play().catch(e => setStatus('⚠ Audio: ' + e.message, 'warn'));

  playing = { seqId: seq.id, showName, funcId: seq.qlcFunctionId, duration: seq.audioDuration ?? 0 };

  // Now playing bar
  document.getElementById('nowPlaying').classList.add('active');
  document.getElementById('npName').textContent = seq.name;

  // Elapsed timer
  timerHandle = setInterval(() => {
    const t = audio.currentTime || 0;
    const d = audio.duration   || 0;
    document.getElementById('npTime').textContent = fmt(t);
    document.getElementById('npFill').style.width = d ? ((t / d) * 100) + '%' : '0%';
  }, 250);

  // Re-render the sequence rows so buttons update
  if (expanded[showName]) renderSequences(showName);
}

function stopPlayback(sendOsc) {
  clearInterval(timerHandle);
  const audio = document.getElementById('audio');
  audio.pause();
  audio.src = '';

  if (sendOsc && playing?.funcId) {
    fetch(`http://127.0.0.1:${BRIDGE_PORT}/qlc`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ host: qlcHost, port: 9999, functionId: playing.funcId, action: 0 }),
    }).catch(() => {});
  }

  const prev = playing;
  playing = null;
  document.getElementById('nowPlaying').classList.remove('active');
  document.getElementById('npFill').style.width = '0%';
  document.getElementById('npTime').textContent  = '0:00';
  setStatus('');

  if (prev?.showName && expanded[prev.showName]) renderSequences(prev.showName);
}

document.getElementById('audio').addEventListener('ended', () => stopPlayback(false));

function seekAudio(e) {
  const audio = document.getElementById('audio');
  if (!audio.duration) return;
  const bar  = e.currentTarget;
  const pct  = e.offsetX / bar.offsetWidth;
  audio.currentTime = pct * audio.duration;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(s) {
  const m = Math.floor(s / 60);
  return m + ':' + Math.floor(s % 60).toString().padStart(2, '0');
}

function esc(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function setStatus(msg, type = '') {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar' + (msg ? ' visible' : '') + (type ? ' ' + type : '');
  bar.textContent = msg;
}

function openCreator() {
  if (vpsUrl) require('electron').shell?.openExternal(vpsUrl);
}
</script>
</body>
</html>
